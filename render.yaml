services:
  - type: web
    name: frictionless-finance-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install --production=false && npm run prisma:generate && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: finance-vault
